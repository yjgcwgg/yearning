version: '3.8'

services:
  yearning:
    build:
      context: ..
      dockerfile: scripts/Dockerfile
    container_name: yearning
    environment:
      MYSQL_USER: ${MYSQL_USER:-yearning}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-Yearning_pass123}
      MYSQL_ADDR: mysql
      MYSQL_DB: ${MYSQL_DB:-yearning}
      SECRET_KEY: ${SECRET_KEY:-dbcjqheupqjsuwsm}
      RPC_ADDR: juno:50001
      IS_DOCKER: is_docker
      Y_LANG: zh_CN
    ports:
      - "${YEARNING_PORT:-8000}:8000"
    command: /bin/bash -c "./Yearning install && ./Yearning run"
    depends_on:
      mysql:
        condition: service_healthy
      juno:
        condition: service_started
    restart: always
    networks:
      - yearning-net

  juno:
    image: yeelabs/juno
    container_name: yearning-juno
    environment:
      MYSQL_USER: ${MYSQL_USER:-yearning}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-Yearning_pass123}
      MYSQL_ADDR: mysql:3306
      MYSQL_DB: ${MYSQL_DB:-yearning}
    ports:
      - "${JUNO_PORT:-50001}:50001"
    depends_on:
      mysql:
        condition: service_healthy
    restart: always
    networks:
      - yearning-net

  mysql:
    image: mysql:8.0
    container_name: yearning-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Yearning_root123}
      MYSQL_DATABASE: ${MYSQL_DB:-yearning}
      MYSQL_USER: ${MYSQL_USER:-yearning}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-Yearning_pass123}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
      - --default-authentication-plugin=mysql_native_password
    volumes:
      - yearning-mysql-data:/var/lib/mysql
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-P", "3306", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-Yearning_root123}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always
    networks:
      - yearning-net

volumes:
  yearning-mysql-data:

networks:
  yearning-net:

# ================================================
# 用法:
#   cd scripts/
#   docker compose up -d              # 启动
#   docker compose up -d --build      # 重新构建并启动
#   docker compose logs -f yearning   # 查看日志
#   docker compose logs -f juno       # 查看 Juno 引擎日志
#   docker compose down               # 停止
#   docker compose down -v            # 停止并删除数据
#
# 自定义配置:
#   创建 .env 文件或导出环境变量:
#   MYSQL_USER=yearning
#   MYSQL_PASSWORD=your_password
#   MYSQL_ROOT_PASSWORD=your_root_password
#   MYSQL_DB=yearning
#   SECRET_KEY=your16charSecret
#   YEARNING_PORT=8000
#   MYSQL_PORT=3307
#   JUNO_PORT=50001
#
# 服务说明:
#   yearning  - Yearning API 服务 (端口 8000)
#   juno      - SQL 检测/执行引擎 (端口 50001)
#   mysql     - MySQL 数据库 (端口 3307)
#
# 默认账号: admin / Yearning_admin
# ================================================
